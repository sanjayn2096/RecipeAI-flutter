name: recipe_ai
description: Sous Chef — generate recipes based on your suggestions and preferences.
publish_to: 'none'
version: 1.0.7+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  http: ^1.1.2
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.0
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  go_router: ^13.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  lottie: ^3.1.3
  font_awesome_flutter: ^11.0.0
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true
  # Matches the artwork’s black field; foreground is the pot graphic.
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/recipe_placeholder.png
    - assets/sous_chef_logo.png
    - assets/sous_chef_logo_dark.png
    - assets/animations/cooking_animation.json

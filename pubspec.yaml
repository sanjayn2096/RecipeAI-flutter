name: recipe_ai
description: RecipeAI - Generate recipes based on user suggestions and preferences.
publish_to: 'none'
version: 2.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  http: ^1.1.2
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
